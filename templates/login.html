<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="loginpage"><form class="loginbox" method="post"><span class="mark">L</span><h1>Entrar</h1><p>Área administrativa do painel.</p>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="alert {{ category }}">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}<label>Usuário<input name="username" required></label><label>Senha<input type="password" name="password" required></label><button>Entrar</button><a href="{{ url_for('home') }}">Voltar</a></form></body></html>
